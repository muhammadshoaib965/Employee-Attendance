<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>University Attendance Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; margin: 0; }
    .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
    .login-box { max-width: 300px; margin: auto; text-align: center; padding-top: 50px; }
    input, select { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
    .btn { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background-color: #218838; }
    .btn-edit { background-color: #ffc107; color: black; padding: 5px 10px; border-radius: 3px; border: none; cursor: pointer; font-size: 12px; }
    .btn-edit:hover { background-color: #e0a800; }
    
    .controls-grid { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
    th, td { padding: 8px; border: 1px solid #ddd; text-align: center; }
    th { background-color: #007bff; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    
    .summary-box { background: #e9ecef; padding: 15px; margin-top: 20px; border-radius: 5px; font-weight: bold; text-align: center;}
    
    #detailedTableContainer, #summaryTable, .print-btn { display: none; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
    .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 300px; border-radius: 8px; text-align: center; }
    .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }

    @media print {
      body { background-color: white; padding: 0; }
      .container { box-shadow: none; max-width: 100%; padding: 0; }
      .no-print { display: none !important; }
      table { font-size: 11px; }
      .action-col { display: none; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="loginScreen" class="login-box no-print">
      <h2>Portal Login</h2>
      <input type="text" id="username" placeholder="Username" style="width: 90%;"><br>
      <input type="password" id="password" placeholder="Password" style="width: 90%;"><br>
      <button class="btn" onclick="login()" style="width: 95%; margin-top: 10px;">Sign In</button>
      <div id="message" style="margin-top: 10px;"></div>
    </div>

    <div id="dashboard" style="display: none;">
      <div class="no-print" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="welcomeText">Attendance Dashboard</h2>
        <p id="roleText" style="color: #666; font-weight: bold;"></p>
      </div>
      <hr class="no-print">
      
      <div id="adminControls" class="no-print controls-grid" style="display: none; background: #e3f2fd; border: 1px solid #90caf9;">
        <div style="flex: 1; border-right: 1px solid #ccc; padding-right: 15px;">
          <h4>1. Upload Machine Data</h4>
          <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="width: 100%;">
          <button class="btn" onclick="processExcel()">Process Data</button>
          <span id="uploadMsg" style="font-size: 12px; display: block; margin-top: 5px;"></span>
        </div>
        <div style="flex: 1; padding-left: 15px;">
          <h4>2. Calendar Overrides</h4>
          <input type="date" id="settingDate">
          <select id="settingType">
            <option value="Holiday">Mark as Holiday</option>
            <option value="Working Weekend">Mark as Working Weekend</option>
          </select>
          <input type="text" id="settingDesc" placeholder="e.g., Eid" style="width: 100px;">
          <button class="btn" style="background: #17a2b8;" onclick="saveSetting()">Save</button>
          <div id="settingMsg" style="font-size: 12px; margin-top: 5px;"></div>
        </div>
      </div>

      <div class="no-print controls-grid">
        <div><label>Start Date:</label><br><input type="date" id="filterStart"></div>
        <div><label>End Date:</label><br><input type="date" id="filterEnd"></div>
        <div id="deptFilterDiv">
          <label>Department:</label><br>
          <select id="filterDept">
            <option value="All">All Departments</option>
            <option value="IT">IT</option>
            <option value="HR">HR</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Administration">Administration</option>
          </select>
        </div>
        <div><label>Employee ID:</label><br><input type="text" id="filterEmpId" placeholder="Blank for dept sum"></div>
        <div style="margin-top: 18px;">
          <button class="btn" style="background-color: #007bff;" onclick="fetchReport()">Get Report</button>
          <button class="btn print-btn" style="background-color: #6c757d; margin-left: 5px;" onclick="window.print()">🖨️</button>
        </div>
      </div>
      
      <div id="reportMsg" class="no-print"></div>
      <h3 id="printHeader" style="display: none; text-align: center;">Attendance Report</h3>

      <table id="summaryTable">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Dept</th><th>Work Days</th><th>Holidays</th><th>Leaves</th><th>Absents</th><th>Target Hrs</th><th>Time Spent</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody"></tbody>
      </table>

      <div id="detailedTableContainer">
        <div id="empSummaryBox" class="summary-box"></div>
        <table id="detailedTable">
          <thead>
            <tr>
              <th>Date</th><th>Check-In</th><th>Check-Out</th><th>Status</th><th>Hours</th><th class="action-col no-print">Edit</th>
            </tr>
          </thead>
          <tbody id="detailedTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h3>Edit Attendance</h3>
      <p id="editDateDisplay" style="font-size: 14px; color: #555;"></p>
      <input type="hidden" id="editEmpId">
      <input type="hidden" id="editDate">
      <label>Check-In (HH:MM):</label><br>
      <input type="time" id="editCheckIn" style="width: 80%;"><br><br>
      <label>Check-Out (HH:MM):</label><br>
      <input type="time" id="editCheckOut" style="width: 80%;"><br><br>
      <button class="btn" onclick="saveEdit()" style="width: 85%;">Save Changes</button>
      <div id="editMsg" style="margin-top: 10px; font-size: 14px;"></div>
    </div>
  </div>

  <script>
    // 🚨 PASTE YOUR LATEST WEB APP URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOuFJfbtY0yN8YCV6KqMRWm_7s-kLhIQab6-uxOrHrlQoa2s0-M7haS-OnSK_6aeKH/exec";

    let currentUserRole = ""; let currentUserDept = "";

    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      const msg = document.getElementById("message");
      if(!user || !pass) return msg.innerText = "Fill in all fields.";
      msg.innerText = "Authenticating..."; msg.style.color = "blue";

      fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", username: user, password: pass }) })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          currentUserRole = data.role; currentUserDept = data.department;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("dashboard").style.display = "block";
          document.getElementById("roleText").innerText = "Role: " + data.role + " | Dept: " + data.department;
          
          if(data.role === "Admin") { document.getElementById("adminControls").style.display = "flex"; } 
          else {
            const deptSelect = document.getElementById("filterDept");
            deptSelect.innerHTML = `<option value="${data.department}">${data.department}</option>`;
            deptSelect.disabled = true;
          }
        } else { msg.innerText = data.message; msg.style.color = "red"; }
      }).catch(err => { msg.innerText = "Connection failed."; msg.style.color = "red"; });
    }

    function formatTime(timeStr) {
      if (!timeStr || timeStr === "Missing" || timeStr === "-") return timeStr;
      if (timeStr.toString().includes("1899")) { return new Date(timeStr).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false}); }
      return timeStr;
    }

    // NEW: Converts 8.5 to "8h 30m"
    function formatHours(decimalHrs) {
      let d = parseFloat(decimalHrs) || 0;
      if (d === 0) return "0h 0m";
      let h = Math.floor(d);
      let m = Math.round((d - h) * 60);
      return `${h}h ${m}m`;
    }

    function fetchReport() {
      const msg = document.getElementById("reportMsg");
      const summaryTable = document.getElementById("summaryTable");
      const detailedTableContainer = document.getElementById("detailedTableContainer");
      
      const filterStart = document.getElementById("filterStart").value;
      const filterEnd = document.getElementById("filterEnd").value;
      const filterEmpId = document.getElementById("filterEmpId").value.trim();
      
      if(!filterStart || !filterEnd) { msg.innerText = "Please select Start and End dates."; msg.style.color = "red"; return; }

      msg.innerText = "Loading data..."; msg.style.color = "blue";
      summaryTable.style.display = "none"; detailedTableContainer.style.display = "none";
      document.querySelector('.print-btn').style.display = "none";

      const payload = { action: "getReport", role: currentUserRole, department: currentUserDept, filters: { startDate: filterStart, endDate: filterEnd, department: document.getElementById("filterDept").value, empId: filterEmpId } };

      fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(data => {
        if(data.success && data.data.length > 0) {
          msg.innerText = "";
          document.querySelector('.print-btn').style.display = "inline-block";
          document.getElementById("printHeader").style.display = "block";
          document.getElementById("printHeader").innerText = `Report: ${filterStart} to ${filterEnd}`;

          if (filterEmpId === "") {
            buildSummaryReport(data.data, data.workingDays, data.requiredHours);
            summaryTable.style.display = "table";
          } else {
            buildDetailedReport(data.data, data.workingDays, data.requiredHours);
            detailedTableContainer.style.display = "block";
          }
        } else { msg.innerText = data.message || "No records found."; msg.style.color = "red"; }
      });
    }

    function buildSummaryReport(records, workingDays, reqHours) {
      const tbody = document.getElementById("summaryTableBody");
      tbody.innerHTML = "";
      let summary = {};

      records.forEach(row => {
        if (!summary[row.empId]) summary[row.empId] = { name: row.name, dept: row.department, total:0, absents:0, leaves:0, holidays:0 };
        
        let hrs = parseFloat(row.hours) || 0;
        summary[row.empId].total += hrs;
        
        if (row.status === "Absent") summary[row.empId].absents++;
        if (row.status.toLowerCase().includes("leave")) summary[row.empId].leaves++;
        if (row.status === "Holiday") summary[row.empId].holidays++; 
      });

      for (let empId in summary) {
        let s = summary[empId];
        let color = s.total < reqHours ? "red" : "green";
        let statusTxt = s.total < reqHours ? "Deficit" : "Target Met";
        
        tbody.innerHTML += `<tr>
          <td>${empId}</td><td style="text-align:left;">${s.name}</td><td>${s.dept}</td>
          <td>${workingDays}</td><td>${s.holidays}</td><td>${s.leaves}</td><td style="color:red; font-weight:bold;">${s.absents}</td>
          <td><b>${formatHours(reqHours)}</b></td>
          <td style="color: ${color}; font-weight: bold;">${formatHours(s.total)}</td>
          <td style="color: ${color}; font-weight: bold;">${statusTxt}</td>
        </tr>`;
      }
    }

    function buildDetailedReport(records, workingDays, reqHours) {
      const tbody = document.getElementById("detailedTableBody");
      const summaryBox = document.getElementById("empSummaryBox");
      tbody.innerHTML = "";
      let total=0, absents=0, leaves=0;
      let empName = records[0].name;

      records.forEach(row => {
        let inTime = formatTime(row.checkIn);
        let outTime = formatTime(row.checkOut);
        
        let statusColor = "black";
        if(row.status.includes("Late Arrival") || row.status.includes("Half Day")) statusColor = "orange";
        if(row.status === "Absent" || row.status.includes("Missing")) { statusColor = "red"; absents++; }
        if(row.status === "Offday") statusColor = "#888";
        if(row.status === "Holiday") statusColor = "#17a2b8";
        if(row.status.toLowerCase().includes("leave")) leaves++;

        let editBtnHtml = `<button class="btn-edit" onclick="openModal('${row.empId}', '${row.date}', '${inTime}', '${outTime}')">Edit</button>`;

        tbody.innerHTML += `<tr>
          <td>${new Date(row.date).toLocaleDateString()}</td>
          <td style="color:${inTime==='Missing'?'red':'inherit'}">${inTime}</td>
          <td style="color:${outTime==='Missing'?'red':'inherit'}">${outTime}</td>
          <td style="color: ${statusColor}; font-weight: bold;">${row.status}</td>
          <td>${formatHours(row.hours)}</td><td class="action-col no-print">${editBtnHtml}</td>
        </tr>`;
        total += parseFloat(row.hours) || 0;
      });

      let color = total < reqHours ? "red" : "green";
      summaryBox.innerHTML = `
        Employee: <b>${empName}</b> | 
        Work Days: ${workingDays} | 
        Absents: <span style="color:red">${absents}</span> | 
        Target: ${formatHours(reqHours)} | 
        Spent: <span style="color: ${color};">${formatHours(total)}</span>
      `;
    }

    function openModal(empId, date, checkIn, checkOut) {
      document.getElementById("editEmpId").value = empId;
      document.getElementById("editDate").value = date;
      document.getElementById("editDateDisplay").innerText = "Updating for Date: " + new Date(date).toLocaleDateString();
      document.getElementById("editCheckIn").value = (checkIn !== "Missing" && checkIn !== "-") ? checkIn.slice(0,5) : "";
      document.getElementById("editCheckOut").value = (checkOut !== "Missing" && checkOut !== "-") ? checkOut.slice(0,5) : "";
      document.getElementById("editMsg").innerText = "";
      document.getElementById("editModal").style.display = "block";
    }

    function saveSetting() {
      const dateVal = document.getElementById("settingDate").value;
      const typeVal = document.getElementById("settingType").value;
      const descVal = document.getElementById("settingDesc").value;
      const msg = document.getElementById("settingMsg");

      if (!dateVal) { msg.innerText = "Please select a date."; msg.style.color = "red"; return; }
      msg.innerText = "Saving..."; msg.style.color = "blue";

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "saveSetting", date: dateVal, type: typeVal, desc: descVal })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) { 
          msg.innerText = "Saved successfully!"; 
          msg.style.color = "green"; 
        } else { 
          msg.innerText = "Error: " + data.message; 
          msg.style.color = "red"; 
        }
      }).catch(err => { 
        msg.innerText = "Network error."; 
        msg.style.color = "red"; 
      });
    }

    function processExcel() {
      const fileInput = document.getElementById("excelFile");
      const msg = document.getElementById("uploadMsg");
      
      if (!fileInput.files.length) { 
        msg.innerText = "Please select an Excel/CSV file first."; 
        msg.style.color = "red"; 
        return; 
      }

      msg.innerText = "Reading file locally..."; 
      msg.style.color = "blue";
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet);

        msg.innerText = "Uploading data... Please wait.";
        
        fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: "upload", records: json })
        })
        .then(res => res.json())
        .then(data => {
          if(data.success) { 
            msg.innerText = data.message; 
            msg.style.color = "green"; 
          } else { 
            msg.innerText = "Error: " + data.message; 
            msg.style.color = "red"; 
          }
        }).catch(err => { 
          msg.innerText = "Upload failed. Check your connection."; 
          msg.style.color = "red"; 
        });
      };
      reader.readAsArrayBuffer(fileInput.files[0]);
    }
</script>
</body>
</html>
