<div class="container">
    <div id="loginScreen" class="login-box no-print">
      <h2>Portal Login</h2>
      <input type="text" id="username" placeholder="Username" style="width: 90%;"><br>
      <input type="password" id="password" placeholder="Password" style="width: 90%;"><br>
      <button class="btn" onclick="login()" style="width: 95%; margin-top: 10px;">Sign In</button>
      <div id="message" style="margin-top: 10px;"></div>
    </div>

    <div id="dashboard">
      <div class="no-print" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 id="welcomeText">Attendance Dashboard</h2>
        <p id="roleText" style="color: #666; font-weight: bold;"></p>
      </div>
      <hr class="no-print">
      
      <div id="adminControls" class="no-print controls-grid" style="display: none; background: #e3f2fd; border: 1px solid #90caf9;">
        <div style="flex: 1; border-right: 1px solid #ccc; padding-right: 15px;">
          <h4>1. Upload Machine Data</h4>
          <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="width: 100%;">
          <button class="btn" onclick="processExcel()">Process Data</button>
          <span id="uploadMsg" style="font-size: 12px;"></span>
        </div>
        
        <div style="flex: 1; padding-left: 15px;">
          <h4>2. Calendar Overrides</h4>
          <input type="date" id="settingDate">
          <select id="settingType">
            <option value="Holiday">Mark as Holiday (Off Day)</option>
            <option value="Working Weekend">Mark as Working Weekend</option>
          </select>
          <input type="text" id="settingDesc" placeholder="e.g., Eid, Labor Day" style="width: 120px;">
          <button class="btn" style="background: #17a2b8;" onclick="saveSetting()">Save Date</button>
          <div id="settingMsg" style="font-size: 12px; margin-top: 5px;"></div>
        </div>
      </div>

      <div class="no-print controls-grid" style="margin-top: 20px;">
        <div><label>Start Date:</label><br><input type="date" id="filterStart"></div>
        <div><label>End Date:</label><br><input type="date" id="filterEnd"></div>
        
        <div id="deptFilterDiv">
          <label>Department:</label><br>
          <select id="filterDept">
            <option value="All">All Departments</option>
            <option value="IT">IT</option>
            <option value="HR">HR</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Administration">Administration</option>
          </select>
        </div>
        <div><label>Employee ID:</label><br><input type="text" id="filterEmpId" placeholder="Blank for dept sum"></div>
        
        <div style="margin-top: 18px;">
          <button class="btn" style="background-color: #007bff;" onclick="fetchReport()">Get Report</button>
          <button class="btn print-btn" style="background-color: #6c757d; margin-left: 5px;" onclick="window.print()">🖨️</button>
        </div>
      </div>
      
      <div id="reportMsg" class="no-print"></div>
      <h3 id="printHeader" style="display: none; text-align: center;">Attendance Report</h3>

      <table id="summaryTable">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Dept</th><th>Required Hours</th><th>Hours Spent</th><th>Status</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody"></tbody>
      </table>

      <div id="detailedTableContainer" style="display: none;">
        <div id="empSummaryBox" class="summary-box"></div>
        <table id="detailedTable">
          <thead>
            <tr>
              <th>Date</th><th>Check-In</th><th>Check-Out</th><th>Status</th><th>Hours</th><th class="action-col no-print">Edit</th>
            </tr>
          </thead>
          <tbody id="detailedTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // PASTE YOUR SCRIPT_URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOuFJfbtY0yN8YCV6KqMRWm_7s-kLhIQab6-uxOrHrlQoa2s0-M7haS-OnSK_6aeKH/exec";

    // ... Keep your login(), formatTime(), openModal(), closeModal(), saveEdit(), processExcel() ...

    // NEW: Save Calendar Setting
    function saveSetting() {
      const msg = document.getElementById("settingMsg");
      const sDate = document.getElementById("settingDate").value;
      const sType = document.getElementById("settingType").value;
      const sDesc = document.getElementById("settingDesc").value;

      if(!sDate || !sDesc) return msg.innerText = "Fill Date & Description.", msg.style.color="red";
      msg.innerText = "Saving...", msg.style.color="blue";

      fetch(SCRIPT_URL, { 
        method: "POST", 
        body: JSON.stringify({ action: "saveSetting", date: sDate, type: sType, desc: sDesc }) 
      }).then(res => res.json()).then(data => {
        msg.innerText = data.message;
        msg.style.color = data.success ? "green" : "red";
      });
    }

    function fetchReport() {
      const msg = document.getElementById("reportMsg");
      const summaryTable = document.getElementById("summaryTable");
      const detailedTableContainer = document.getElementById("detailedTableContainer");
      
      const filterStart = document.getElementById("filterStart").value;
      const filterEnd = document.getElementById("filterEnd").value;
      
      if(!filterStart || !filterEnd) {
          msg.innerText = "Please select both Start and End dates."; msg.style.color = "red"; return;
      }

      msg.innerText = "Loading data..."; msg.style.color = "blue";
      summaryTable.style.display = "none"; detailedTableContainer.style.display = "none";

      const payload = { 
        action: "getReport", role: currentUserRole, department: currentUserDept, 
        filters: { 
          startDate: filterStart, endDate: filterEnd, 
          department: document.getElementById("filterDept").value, 
          empId: document.getElementById("filterEmpId").value.trim() 
        } 
      };

      fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(data => {
        if(data.success && data.data.length > 0) {
          msg.innerText = "";
          document.getElementById("printHeader").style.display = "block";
          document.getElementById("printHeader").innerText = `Report: ${filterStart} to ${filterEnd}`;

          if (payload.filters.empId === "") {
            buildSummaryReport(data.data, data.requiredHours);
            summaryTable.style.display = "table";
          } else {
            buildDetailedReport(data.data, data.requiredHours);
            detailedTableContainer.style.display = "block";
            document.getElementById("detailedTable").style.display = "table";
          }
        } else {
          msg.innerText = data.message || "No records found."; msg.style.color = "red";
        }
      });
    }

    function buildSummaryReport(records, reqHours) {
      const tbody = document.getElementById("summaryTableBody");
      tbody.innerHTML = "";
      let summary = {};

      records.forEach(row => {
        let hrs = parseFloat(row.hours) || 0;
        if (!summary[row.empId]) summary[row.empId] = { name: row.name, dept: row.department, total:0 };
        summary[row.empId].total += hrs;
      });

      for (let empId in summary) {
        let s = summary[empId];
        let color = s.total < reqHours ? "red" : "green";
        let statusTxt = s.total < reqHours ? "Deficit" : "Target Met";
        
        tbody.innerHTML += `<tr>
          <td>${empId}</td><td>${s.name}</td><td>${s.dept}</td>
          <td><b>${reqHours}</b></td>
          <td style="color: ${color}; font-weight: bold;">${s.total.toFixed(2)}</td>
          <td style="color: ${color};">${statusTxt}</td>
        </tr>`;
      }
    }

    function buildDetailedReport(records, reqHours) {
      const tbody = document.getElementById("detailedTableBody");
      const summaryBox = document.getElementById("empSummaryBox");
      tbody.innerHTML = "";
      let total=0;
      let empName = records[0].name;

      records.forEach(row => {
        let inTime = formatTime(row.checkIn);
        let outTime = formatTime(row.checkOut);
        
        let statusColor = "black";
        if(row.status.includes("Late Arrival") || row.status.includes("Half Day")) statusColor = "orange";
        if(row.status.includes("Missing") || row.status.includes("Weekend") || row.status.includes("Holiday")) statusColor = "red";

        let editBtnHtml = `<button class="btn-edit" onclick="openModal('${row.empId}', '${row.date}', '${inTime}', '${outTime}')">Edit</button>`;

        tbody.innerHTML += `<tr>
          <td>${new Date(row.date).toLocaleDateString()}</td>
          <td>${inTime}</td><td>${outTime}</td>
          <td style="color: ${statusColor}; font-weight: bold;">${row.status}</td>
          <td>${row.hours}</td><td class="action-col no-print">${editBtnHtml}</td>
        </tr>`;

        total += parseFloat(row.hours) || 0;
      });

      let color = total < reqHours ? "red" : "green";
      summaryBox.innerHTML = `Employee: ${empName} | Target Hours: ${reqHours} | <span style="color: ${color};">Time Spent: ${total.toFixed(2)} Hours</span>`;
    }
  </script>
